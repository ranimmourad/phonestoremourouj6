<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)"/>
  <!-- Phone outline -->
  <rect x="55" y="30" width="60" height="105" rx="12" ry="12" fill="none" stroke="url(#phoneGrad)" stroke-width="6"/>
  <rect x="65" y="42" width="40" height="70" rx="4" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.3"/>
  <circle cx="85" cy="125" r="4" fill="#f59e0b" opacity="0.5"/>
  <!-- Shopping bag -->
  <g transform="translate(105, 95)">
    <path d="M10 20 L10 50 Q10 55 15 55 L55 55 Q60 55 60 50 L60 20 Z" fill="none" stroke="white" stroke-width="3" opacity="0.8"/>
    <path d="M22 20 L22 12 Q22 2 35 2 Q48 2 48 12 L48 20" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="100" y="170" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="22" fill="white">Phone Store</text>
  <text x="100" y="190" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="11" fill="#93c5fd">Mourouj 6</text>
</svg>
